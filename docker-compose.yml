services:
  db:
    image: postgres:17-alpine
    container_name: estate-planner-db
    environment:
      POSTGRES_USER: estate
      POSTGRES_PASSWORD: estate_dev_password
      POSTGRES_DB: estate_planner
    ports:
      - "5432:5432"
    volumes:
      - estate_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estate -d estate_planner"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  estate_pgdata:
